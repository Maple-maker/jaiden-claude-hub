<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>404 — Signal Lost · Jaiden Rabatin</title>
<meta name="robots" content="noindex"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@900&family=DM+Sans:wght@400;500&family=DM+Mono:wght@500&display=swap" rel="stylesheet"/>
<style>
  :root{--obsidian:#0B0B0B;--bone:#F4F1EA;--orange:#C4522A;--tan:#C2A878;--ash:#6B6B6B;
    --line:rgba(194,168,120,.18)}
  *{box-sizing:border-box;margin:0;padding:0}
  body{min-height:100vh;display:flex;align-items:center;justify-content:center;
    background:var(--obsidian);color:var(--bone);font-family:'DM Sans',system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;overflow-x:hidden;position:relative}
  body::before{content:"";position:fixed;inset:0;pointer-events:none;
    background:radial-gradient(52% 40% at 50% 8%,rgba(196,82,42,.10),transparent 70%)}
  main{position:relative;z-index:1;width:100%;max-width:520px;padding:40px 24px;text-align:center}
  .tag{display:inline-flex;align-items:center;gap:10px;border:1px solid var(--line);border-radius:4px;
    padding:8px 12px;font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.14em;
    text-transform:uppercase;color:var(--tan);position:relative}
  .tag::before,.tag::after{content:"";position:absolute;width:8px;height:8px;border:1px solid var(--tan)}
  .tag::before{top:-1px;left:-1px;border-right:0;border-bottom:0}
  .tag::after{bottom:-1px;right:-1px;border-left:0;border-top:0}
  h1{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:clamp(96px,28vw,180px);
    line-height:.86;letter-spacing:-.02em;margin:26px 0 6px}
  .cmd{font-family:'DM Mono',monospace;font-size:14px;color:var(--tan)}
  .cmd .p{color:var(--orange)}
  .cmd .cur{display:inline-block;width:.62ch;background:var(--bone);color:transparent;margin-left:1px;
    animation:blink 1.1s steps(1) infinite}
  @keyframes blink{50%{opacity:0}}
  p.sub{color:rgba(244,241,234,.56);font-size:15px;margin:14px auto 0;max-width:36ch}
  a.back{display:inline-flex;align-items:center;gap:9px;margin-top:30px;
    background:var(--orange);color:#160a05;font-weight:700;font-size:15px;
    padding:13px 20px;border-radius:6px;text-decoration:none;min-height:46px;
    transition:background .2s ease,transform .2s ease}
  a.back:hover{background:#d75e34;transform:translateY(-1px)}
  a.back:focus-visible{outline:2px solid var(--tan);outline-offset:3px}
  .ic{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2}
  @media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
  <main>
    <span class="tag">FIELD MANUAL &middot; SIGNAL LOST</span>
    <h1>404</h1>
    <p class="cmd"><span class="p">&gt;</span> requested page not found in this sector<span class="cur">_</span></p>
    <p class="sub">The trail went cold. Head back to the field guides and pick up the map.</p>
    <a class="back" href="/">
      <svg class="ic" viewBox="0 0 24 24" aria-hidden="true"><path d="M19 12H5m6 6l-6-6 6-6"/></svg>
      Back to the guides
    </a>
  </main>
</body>
</html>
